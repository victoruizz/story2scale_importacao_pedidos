<h1 class="page-title">Upload de importacao</h1>
<p class="page-subtitle">Selecione um arquivo .csv com os pedidos para importar.</p>

<div class="card">
  @if (erro()) {
    <div class="alerta alerta-erro">{{ erro() }}</div>
  }

  @if (idCriado() !== null) {
    <div class="alerta alerta-sucesso">
      Importacao enviada com sucesso. ID: <strong>{{ idCriado() }}</strong>.
      <a [routerLink]="['/importacoes', idCriado()]">Ver detalhe</a>
    </div>
  }

  <div class="campo">
    <label for="arquivo">Arquivo CSV</label>
    <input
      id="arquivo"
      class="input"
      type="file"
      accept=".csv"
      (change)="selecionar($event)"
    />
  </div>

  @if (arquivo()) {
    <p class="arquivo-info">Selecionado: {{ arquivo()!.name }}</p>
  }

  <div class="acoes">
    <button
      class="btn btn-primary"
      type="button"
      [disabled]="!arquivo() || enviando()"
      (click)="enviar()"
    >
      {{ enviando() ? 'Enviando...' : 'Enviar' }}
    </button>
  </div>
</div>
